    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmed - VetGPT</title>
    <meta http-equiv="refresh" content="3;url=vetgpt://auth/callback">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .success-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        h1 {
            color: #1f2937;
            margin-bottom: 15px;
            font-size: 32px;
        }
        p {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            font-size: 16px;
        }
        .loading {
            margin-top: 20px;
            font-size: 14px;
            color: #9ca3af;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e5e7eb;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Email Confirmed!</h1>
        <p>Your VetGPT account is now verified and ready to use.</p>
        <p style="font-weight: 600; color: #10b981;">Opening the app...</p>
        
        <div class="loading">
            <div class="spinner"></div>
            If the app doesn't open automatically:
        </div>
        
        <a href="vetgpt://auth/callback" class="btn">Open VetGPT App</a>
        
        <p style="margin-top: 30px; font-size: 14px; color: #9ca3af;">
            You can now close this page and return to the app to sign in.
        </p>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'vetgpt://auth/callback';
        }, 1500);
    </script>
</body>
</html>
